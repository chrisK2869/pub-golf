// ─── Score Symbol ─────────────────────────────────────────────────────────────
function ScoreSymbol({ diff, score, size=26, color="#3d7236", isHIO=false, isDNF=false }) {
  const s=size, mid=s/2, r=s*0.36;
  if (isDNF) return <span style={{fontSize:s*0.38,color:"#999",fontFamily:"system-ui",fontWeight:700}}>DNF</span>;
  if (score===null||score===undefined) return <span style={{fontSize:s*0.5,color:"#bbb"}}>—</span>;
  if (isHIO) return (
    <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`}>
      <circle cx={mid} cy={mid} r={r*1.1} fill="none" stroke={color} strokeWidth={1.6}/>
      <circle cx={mid} cy={mid} r={r*0.65} fill="none" stroke={color} strokeWidth={1.3}/>
      <text x={mid} y={mid+s*0.16} textAnchor="middle" fontSize={s*0.28} fill={color} fontFamily="Georgia,serif" fontWeight="900">HIO</text>
    </svg>
  );
  if (diff<=-3) return (
    <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`}>
      <circle cx={mid} cy={mid} r={r*1.05} fill="none" stroke={color} strokeWidth={1.2}/>
      <circle cx={mid} cy={mid} r={r*0.70} fill="none" stroke={color} strokeWidth={1.2}/>
      <circle cx={mid} cy={mid} r={r*0.38} fill="none" stroke={color} strokeWidth={1.2}/>
      <text x={mid} y={mid+s*0.17} textAnchor="middle" fontSize={s*0.3} fill={color} fontFamily="Georgia,serif" fontWeight="700">{score}</text>
    </svg>
  );
  if (diff===-2) return (
    <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`}>
      <circle cx={mid} cy={mid} r={r} fill="none" stroke={color} strokeWidth={1.5}/>
      <circle cx={mid} cy={mid} r={r*0.58} fill="none" stroke={color} strokeWidth={1.5}/>
      <text x={mid} y={mid+s*0.17} textAnchor="middle" fontSize={s*0.36} fill={color} fontFamily="Georgia,serif" fontWeight="700">{score}</text>
    </svg>
  );
  if (diff===-1) return (
    <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`}>
      <circle cx={mid} cy={mid} r={r} fill="none" stroke={color} strokeWidth={1.6}/>
      <text x={mid} y={mid+s*0.17} textAnchor="middle" fontSize={s*0.38} fill={color} fontFamily="Georgia,serif" fontWeight="700">{score}</text>
    </svg>
  );
  if (diff===0) return <span style={{fontSize:s*0.55,color,fontFamily:"Georgia,serif",fontWeight:"700",lineHeight:1}}>{score}</span>;
  if (diff===1){const p=s*0.1;return(
    <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`}>
      <rect x={p} y={p} width={s-p*2} height={s-p*2} fill="none" stroke={color} strokeWidth={1.6} rx={2}/>
      <text x={mid} y={mid+s*0.17} textAnchor="middle" fontSize={s*0.38} fill={color} fontFamily="Georgia,serif" fontWeight="700">{score}</text>
    </svg>
  );}
  if (diff===2){const p1=s*0.05,p2=s*0.16;return(
    <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`}>
      <rect x={p1} y={p1} width={s-p1*2} height={s-p1*2} fill="none" stroke={color} strokeWidth={1.3} rx={2}/>
      <rect x={p2} y={p2} width={s-p2*2} height={s-p2*2} fill="none" stroke={color} strokeWidth={1.3} rx={2}/>
      <text x={mid} y={mid+s*0.17} textAnchor="middle" fontSize={s*0.36} fill={color} fontFamily="Georgia,serif" fontWeight="700">{score}</text>
    </svg>
  );}
  const p1=s*0.03,p2=s*0.13,p3=s*0.23;
  return(
    <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`}>
      <rect x={p1} y={p1} width={s-p1*2} height={s-p1*2} fill="none" stroke={color} strokeWidth={1.2} rx={2}/>
      <rect x={p2} y={p2} width={s-p2*2} height={s-p2*2} fill="none" stroke={color} strokeWidth={1.2} rx={2}/>
      <rect x={p3} y={p3} width={s-p3*2} height={s-p3*2} fill="none" stroke={color} strokeWidth={1.2} rx={2}/>
      <text x={mid} y={mid+s*0.17} textAnchor="middle" fontSize={s*0.28} fill={color} fontFamily="Georgia,serif" fontWeight="700">{score}</text>
    </svg>
  );
}

function scoreName(diff,isHIO,isDNF){
  if(isDNF) return "Did Not Finish";
  if(isHIO) return "Hole in One! 🌟";
  if(diff<=-3) return "Albatross 🦅";
  if(diff===-2) return "Eagle 🦅";
  if(diff===-1) return "Birdie 🐦";
  if(diff===0)  return "Par ✅";
  if(diff===1)  return "Bogey";
  if(diff===2)  return "Double Bogey";
  if(diff===3)  return "Triple Bogey";
  return `+${diff}`;
}

// ─── Fireworks (bigger, more bursts) ─────────────────────────────────────────
function Fireworks({ onDone }) {
  const canvasRef = useRef(null);
  useEffect(()=>{
    const canvas=canvasRef.current; if(!canvas) return;
    const ctx=canvas.getContext("2d");
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    const colors=["#c9872a","#4a8c3f","#ffffff","#c04040","#e8c87a","#a8d4a0","#7ab8d4","#f4a0e0","#ffdd44"];
    const particles=[];
    for(let b=0;b<12;b++){
      const x=80+Math.random()*(canvas.width-160);
      const y=60+Math.random()*(canvas.height*0.55);
      for(let i=0;i<60;i++){
        const angle=(Math.PI*2*i)/60, speed=2+Math.random()*7;
        particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-2,life:1,color:colors[Math.floor(Math.random()*colors.length)],size:2+Math.random()*4});
      }
    }
    let frame=0;
    const anim=()=>{
      ctx.fillStyle="rgba(0,0,0,0.12)";
      ctx.fillRect(0,0,canvas.width,canvas.height);
      particles.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.10; p.vx*=0.98; p.life-=0.012;
        ctx.globalAlpha=Math.max(0,p.life);
        ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1; frame++;
      if(frame<180) requestAnimationFrame(anim); else onDone?.();
    };
    requestAnimationFrame(anim);
  },[]);
  return <canvas ref={canvasRef} style={{position:"fixed",inset:0,zIndex:200,pointerEvents:"none"}}/>;
}

  useEffect(()=>{

  },[]);

  const triggerBall=()=>{
    setBallPhase("rolling");
    setBallX(-5); setBallY(0); setBallScale(1); setBallOpacity(1);
    const startTime=Date.now();
    const duration=1200;
    const holeX=62.5; // hole is at ~62.5% of SVG width
    const tick=()=>{
      const elapsed=Date.now()-startTime;
      const progress=Math.min(elapsed/duration,1);
      const eased=1-Math.pow(1-progress,3);
      setBallX(-5+eased*(holeX+5));
      const arc=Math.sin(progress*Math.PI)*6;
      setBallY(-arc);

        setBallScale(0.15);
        setBallOpacity(0);
        setBallPhase("inhole");
        setTimeout(()=>onNewGame(),350);
        return;
      }
      animRef.current=requestAnimationFrame(tick);
    };
    animRef.current=requestAnimationFrame(tick);
  };

// ─── Hole Picker (scroll wheel 1-18) ─────────────────────────────────────────
function HolePicker({ value, onChange }) {
  const HOLES = Array.from({length:18},(_,i)=>i+1);
  const itemH = 52;
  const containerH = itemH * 5;
  const scrollRef = useRef(null);
  const debounceRef = useRef(null);
  const [highlighted, setHighlighted] = useState(value);

  useEffect(()=>{
    const el = scrollRef.current;
    if(!el) return;
    el.scrollTop = (value-1)*itemH;
    setHighlighted(value);
  },[]);

  const commitValue = (n)=>{
    const clamped = Math.max(1,Math.min(18,n));
    const el = scrollRef.current;
    if(el) el.scrollTo({top:(clamped-1)*itemH, behavior:"smooth"});
    setHighlighted(clamped);
    onChange(clamped);
  };

  const handleScroll = ()=>{
    const el = scrollRef.current;
    if(!el) return;
    const idx = Math.round(el.scrollTop / itemH);
    const clamped = Math.max(0, Math.min(17, idx));
    setHighlighted(clamped+1);
    if(debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(()=>{
      const el2 = scrollRef.current;
      if(!el2) return;
      const idx2 = Math.round(el2.scrollTop / itemH);
      const c2 = Math.max(0, Math.min(17, idx2));
      el2.scrollTo({top:c2*itemH, behavior:"smooth"});
      setHighlighted(c2+1);
      onChange(c2+1);
    }, 150);
  };

  useEffect(()=>()=>{ if(debounceRef.current) clearTimeout(debounceRef.current); },[]);
  return (
    <div style={{position:"relative",height:containerH,overflow:"hidden",borderRadius:16,border:`1.5px solid ${T.border}`,background:T.bgInput,userSelect:"none"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:itemH*2,background:`linear-gradient(to bottom,${T.bgInput},transparent)`,zIndex:2,pointerEvents:"none"}}/>
      <div style={{position:"absolute",bottom:0,left:0,right:0,height:itemH*2,background:`linear-gradient(to top,${T.bgInput},transparent)`,zIndex:2,pointerEvents:"none"}}/>
      <div style={{position:"absolute",top:itemH*2,left:8,right:8,height:itemH,background:"rgba(184,120,10,0.06)",border:`2px solid ${T.amber}`,zIndex:3,pointerEvents:"none",borderRadius:10}}/>
      <div ref={scrollRef} onScroll={handleScroll}
        style={{height:"100%",overflowY:"scroll",scrollbarWidth:"none",msOverflowStyle:"none",WebkitOverflowScrolling:"touch",touchAction:"pan-y",position:"relative",zIndex:4}}>
        <div style={{height:itemH*2}}/>
        {HOLES.map(n=>(
          <div key={n} onClick={()=>commitValue(n)}
            style={{height:itemH,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
            <span style={{
              fontSize:n===highlighted?22:15,
              fontWeight:n===highlighted?800:400,
              color:n===highlighted?T.amber:T.textDim,
              fontFamily:"Georgia,serif",
              transition:"all 0.12s ease",
              userSelect:"none",
            }}>
              {n} {n===1?"hole":"holes"}
            </span>
          </div>
        ))}
        <div style={{height:itemH*2}}/>
      </div>
    </div>
  );
}

        {!isDNF&&(

            <button onClick={()=>onSips(Math.max(1,(ps.sips||1)-1))} style={{...S.counterBtn,borderColor:player.colour.hex+"88",color:player.colour.hex}}>−</button>
            <div style={{minWidth:60,textAlign:"center"}}>
              <div style={{fontSize:42,fontWeight:900,color:ps.sips===null?T.textLight:player.colour.hex,lineHeight:1,fontFamily:"Georgia,serif"}}>{ps.sips===null?"?":ps.sips}</div>
  
              {penTotal>0&&<div style={{fontSize:11,color:T.red,fontFamily:"system-ui"}}>+{penTotal} → {eff}</div>}
            </div>
            <button onClick={()=>onSips((ps.sips||0)+1)} style={{...S.counterBtn,borderColor:player.colour.hex+"88",color:player.colour.hex}}>+</button>
          </div>
        )}
        {/* Penalties + Skip row */}
        <div style={{display:"flex",gap:6}}>
          {!isDNF&&(
            <button onClick={()=>setShowPens(!showPens)} style={{flex:1,background:ps.penalties.length>0?T.redPale+"44":"none",border:`1px solid ${ps.penalties.length>0?T.red+"88":T.border}`,borderRadius:8,padding:"7px 10px",cursor:"pointer",display:"flex",justifyContent:"space-between",color:ps.penalties.length>0?T.red:T.textDim,fontSize:12,fontFamily:"system-ui"}}>
              <span>⚠️ Penalties {ps.penalties.length>0?`(+${penTotal})`:""}</span>
              <span>{showPens?"▲":"▼"}</span>
            </button>
          )}
          <button onClick={onSkip} style={{padding:"7px 10px",borderRadius:8,border:`1px solid ${isDNF?T.red:T.border}`,background:isDNF?T.redPale+"44":"none",cursor:"pointer",fontSize:12,color:isDNF?T.red:T.textDim,fontFamily:"system-ui",whiteSpace:"nowrap"}}>
            {isDNF?"↩ Undo DNF":"Skip (DNF)"}
          </button>
        </div>
        {showPens&&!isDNF&&(
          <div style={{marginTop:8,display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
            {customPenalties.map(pen=>{
              const active=ps.penalties.find(p=>p.id===pen.id);
              return(
                <button key={pen.id} onClick={()=>onTogglePenalty(pen)} style={{padding:"7px 8px",borderRadius:8,border:`1px solid ${active?T.red+"88":T.border}`,background:active?T.redPale+"44":T.bgCardAlt,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:14}}>{pen.icon}</span>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontSize:11,color:active?T.red:T.textMid,fontFamily:"system-ui",lineHeight:1.2}}>{pen.label}</div>
                    <div style={{fontSize:10,color:active?T.red:T.textDim,fontWeight:700,fontFamily:"system-ui"}}>+{pen.strokes}</div>
                  </div>
                </button>
              );
            })}
            <button onClick={onOpenCustomPen} style={{padding:"7px 8px",borderRadius:8,border:`1px dashed ${T.border}`,background:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
              <span style={{fontSize:14}}>＋</span>
              <span style={{fontSize:11,color:T.textDim,fontFamily:"system-ui"}}>Custom</span>
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Photo Section ────────────────────────────────────────────────────────────
function PhotoSection({ photos, onAdd }) {
  const cameraRef = useRef(null);
  const galleryRef = useRef(null);

  const handleFile = (e) => {
    const files = e.target.files;
    if (!files || files.length === 0) return;
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => onAdd({
        type: file.type.startsWith("video") ? "video" : "photo",
        data: ev.target.result,
        name: file.name,
      });
      reader.readAsDataURL(file);
    });
    e.target.value = "";
  };

  const triggerCamera = () => {
    if (cameraRef.current) {
      cameraRef.current.value = "";
      cameraRef.current.click();
    }
  };

  const triggerGallery = () => {
    if (galleryRef.current) {
      galleryRef.current.value = "";
      galleryRef.current.click();
    }
  };

  return (
    <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:12,padding:"10px 12px",marginBottom:10}}>
      <div style={{fontSize:12,color:T.textMid,fontFamily:"system-ui",marginBottom:8,fontWeight:600}}>📷 Photos & Videos</div>
      {/* Thumbnails */}
      {photos.length > 0 && (
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
          {photos.map((p,i)=>(
            <div key={i} style={{width:54,height:54,borderRadius:8,overflow:"hidden",border:`1px solid ${T.border}`,flexShrink:0,position:"relative"}}>
              {p.type==="video"
                ?<div style={{width:"100%",height:"100%",background:T.greenLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🎥</div>
                :<img src={p.data} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              }
            </div>
          ))}
        </div>
      )}
      {/* Two separate buttons — camera & gallery */}
      <div style={{display:"flex",gap:8}}>
        {/* Camera button */}
        <button
          type="button"
          onClick={triggerCamera}
          style={{flex:1,padding:"9px 0",borderRadius:10,border:`1.5px solid ${T.border}`,background:T.bgCardAlt,display:"flex",alignItems:"center",justifyContent:"center",gap:6,cursor:"pointer"}}>
          <span style={{fontSize:18}}>📷</span>
          <span style={{fontSize:12,color:T.textMid,fontFamily:"system-ui",fontWeight:600}}>Camera</span>
        </button>
        {/* Gallery / file upload button */}
        <button
          type="button"
          onClick={triggerGallery}
          style={{flex:1,padding:"9px 0",borderRadius:10,border:`1.5px solid ${T.border}`,background:T.bgCardAlt,display:"flex",alignItems:"center",justifyContent:"center",gap:6,cursor:"pointer"}}>
          <span style={{fontSize:18}}>🖼️</span>
          <span style={{fontSize:12,color:T.textMid,fontFamily:"system-ui",fontWeight:600}}>Gallery</span>
        </button>
      </div>
      {/* Hidden inputs — separate so capture attribute applies correctly */}
      <input
        ref={cameraRef}
        type="file"
        accept="image/*,video/*"
        capture="environment"
        multiple={false}
        style={{position:"fixed",top:"-9999px",left:"-9999px",opacity:0,width:1,height:1}}
        onChange={handleFile}
      />
      <input
        ref={galleryRef}
        type="file"
        accept="image/*,video/*"
        multiple
        style={{position:"fixed",top:"-9999px",left:"-9999px",opacity:0,width:1,height:1}}

      />
    </div>
  );
}

// ─── Scorecard ────────────────────────────────────────────────────────────────
function Scorecard({ players, holes, scores, halfPoint, currentHole, getEffective, isHIO, isDNF }) {
  const getPar=(from,to)=>holes.slice(from,to).filter(h=>h.par).reduce((s,h)=>s+h.par,0);
  const getTotal=(pi,from,to)=>{
    let t=0;
    for(let i=from;i<to;i++){const e=getEffective(pi,i);if(e!==null)t+=e;}
    return t;
  };

  const Section=({from,to,label,isLast=false})=>{
    const sHoles=holes.slice(from,to);
    const sPar=getPar(from,to);
    return (
      <div style={{marginBottom:14}}>
        <div style={{background:`linear-gradient(135deg,${T.bgDark},${T.bgMid})`,borderRadius:"10px 10px 0 0",padding:"6px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11,color:T.amberPale,fontWeight:700,letterSpacing:2,fontFamily:"system-ui",textTransform:"uppercase"}}>{label}</span>
          {sPar>0&&<span style={{fontSize:11,color:T.greenPale,fontFamily:"system-ui"}}>Par {sPar}</span>}
        </div>
        <div style={{background:"#faf6ed",borderRadius:"0 0 10px 10px",overflow:"hidden",border:`1px solid ${T.border}`}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"Georgia,serif"}}>
            <thead>
              <tr style={{background:T.creamMid}}>
                <th style={{...SC.th,textAlign:"left",paddingLeft:10,color:"#555"}}>HOLE</th>
                <th style={{...SC.th,color:"#2a6a2a"}}>PAR</th>
                {players.map((p,i)=><th key={i} style={{...SC.th,color:p.colour.hex}}>{p.name.substring(0,5)} </th>)}
              </tr>
            </thead>
            <tbody>
              {sHoles.map((h,idx)=>{
                const hi=from+idx, isCur=hi===currentHole;
                return(
                  <tr key={hi} style={{background:isCur?"#fffbe8":idx%2===0?T.cream:"#f0ebe0",borderBottom:`1px solid #ddd0b0`}}>
                    <td style={{...SC.td,textAlign:"left",paddingLeft:10,color:isCur?T.amber:"#555",fontWeight:isCur?700:400,fontSize:11}}>
                      <div style={{fontWeight:600}}>{hi+1}{h.name?` · ${h.name.substring(0,8)}`:""}
                      {isCur&&<span style={{fontSize:8,marginLeft:3}}>▶</span>}</div>
                    </td>
                    <td style={{...SC.td,color:"#2a6a2a",fontWeight:600}}>{h.par||"—"}</td>
                    {players.map((p,pi)=>{
                      const eff=getEffective(pi,hi); // par+2 for DNF
                      const hio=isHIO(pi,hi);
                      const dnf=isDNF(pi,hi);
                      const diff=eff!==null&&!hio?eff-h.par:null;
                      return(
                        <td key={pi} style={{...SC.td}}>
                          {eff!==null
                            ?<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:0}}>
                               <ScoreSymbol diff={hio?-99:diff} score={eff} size={24} color={p.colour.hex} isHIO={hio} isDNF={false}/>
                               {dnf&&<span style={{fontSize:8,color:"#aaa",fontFamily:"system-ui",letterSpacing:0.3,lineHeight:1}}>dnf</span>}
                             </div>
                            :<span style={{color:"#ccc",fontSize:12}}>—</span>
                          }
                        </td>
                      );
                    })}
                  </tr>
                );
              })}
            </tbody>
            {/* Score row + Result row */}
            <tfoot>
              <tr style={{background:"#e4d8b8",borderTop:`2px solid #c8b890`}}>
                <td style={{...SC.td,textAlign:"left",paddingLeft:10,fontWeight:700,fontSize:10,color:"#555",fontFamily:"system-ui"}}>SCORE</td>
                <td style={{...SC.td,fontWeight:700,color:"#2a6a2a"}}>{sPar||"—"}</td>
                {players.map((p,pi)=>{
                  const played=scores[pi].slice(from,to).filter(h=>h.sips!==null||h.dnf).length;
                  const subtot=getTotal(pi,from,to);
                  return(
                    <td key={pi} style={{...SC.td}}>
                      {played>0?<span style={{fontSize:13,fontWeight:700,color:p.colour.hex}}>{subtot}</span>:<span style={{color:"#ccc",fontSize:12}}>—</span>}
                    </td>
                  );
                })}
              </tr>
              <tr style={{background:"#d8ccaa",borderTop:`1px solid #c8b890`}}>
                <td style={{...SC.td,textAlign:"left",paddingLeft:10,fontWeight:700,fontSize:10,color:"#555",fontFamily:"system-ui"}}>RESULT</td>
                <td style={{...SC.td}}></td>
                {players.map((p,pi)=>{
                  const played=scores[pi].slice(from,to).filter(h=>h.sips!==null||h.dnf).length;
                  if(played===0) return <td key={pi} style={{...SC.td}}><span style={{color:"#ccc",fontSize:12}}>—</span></td>;
                  const subtot=getTotal(pi,from,to);
                  const subpar=getPar(from,from+played);
                  const rel=subpar>0?subtot-subpar:null;
                  return(
                    <td key={pi} style={{...SC.td}}>
                      {rel!==null
                        ?<span style={{fontSize:13,fontWeight:700,color:rel<0?p.colour.hex:rel===0?T.sky:p.colour.hex}}>{rel===0?"E":rel>0?`+${rel}`:`${rel}`}</span>
                        :<span style={{color:"#ccc",fontSize:12}}>—</span>
                      }
                    </td>
                  );
                })}
              </tr>
              {isLast&&(
                <>
                  <tr style={{background:"#c8bc98",borderTop:"2px solid #a89870"}}>
                    <td style={{...SC.td,textAlign:"left",paddingLeft:10,fontWeight:800,fontSize:10,color:"#3a2a10",fontFamily:"system-ui",letterSpacing:1}}>TOTAL</td>
                    <td style={{...SC.td,fontWeight:700,color:"#2a6a2a",fontSize:11}}>{totalPar>0?`Par ${totalPar}`:"—"}</td>
                    {players.map((p,pi)=>{
                      const allPlayed=scores[pi].filter(h=>h.sips!==null||h.dnf).length;
                      const tot=getTotal(pi,0,holes.length);
                      return(<td key={pi} style={{...SC.td}}>{allPlayed>0?<span style={{fontSize:14,fontWeight:800,color:p.colour.hex}}>{tot}</span>:<span style={{color:"#ccc"}}>—</span>}</td>);
                    })}
                  </tr>
                  <tr style={{background:"#beb08c",borderTop:"1px solid #a89870"}}>
                    <td style={{...SC.td,textAlign:"left",paddingLeft:10,fontWeight:700,fontSize:10,color:"#3a2a10",fontFamily:"system-ui",letterSpacing:1}}>RESULT</td>
                    <td style={{...SC.td}}></td>
                    {players.map((p,pi)=>{
                      const allPlayed=scores[pi].filter(h=>h.sips!==null||h.dnf).length;
                      const tot=getTotal(pi,0,holes.length);
                      const tPar=getPar(0,allPlayed);
                      const rel=tPar>0?tot-tPar:null;
                      return(<td key={pi} style={{...SC.td}}>{rel!==null?<span style={{fontSize:13,fontWeight:800,color:p.colour.hex}}>{rel===0?"E":rel>0?`+${rel}`:`${rel}`}</span>:<span style={{color:"#ccc"}}>—</span>}</td>);
                    })}
                  </tr>
                </>
              )}
            </tfoot>
          </table>
        </div>
      </div>
    );
  };

  const totalPar=getPar(0,holes.length);
  return (
    <div>
      <Section from={0} to={halfPoint} label={holes.length===1?"Course":`Front ${halfPoint}`} isLast={holes.length===1}/>
      {holes.length>1&&<Section from={halfPoint} to={holes.length} label={`Back ${holes.length-halfPoint}`} isLast={true}/>}
    </div>
  );
}

// ─── Game Screen ──────────────────────────────────────────────────────────────
function GameScreen({ game, onEnd, onHome }) {
  const { gameName, players, numHoles } = game;

  // holes state — each hole gets filled in as we play
  const [holes, setHoles] = useState(()=>{
    if(game.holes && game.holes.length===numHoles) return game.holes;
    return Array.from({length:numHoles},(_,i)=>({name:"",par:3,drink:null,drinks:[...DEFAULT_DRINKS]}));
  });
  const half=Math.ceil(numHoles/2);

  const [scores, setScores] = useState(()=>{
    if(game.scores && game.scores.length===players.length) return game.scores;
    return players.map(()=>Array.from({length:numHoles},()=>({sips:null,penalties:[],dnf:false})));
  });
  const [sideBets, setSideBets] = useState(game.sideBets || []);
  const [customPenalties, setCustomPenalties] = useState(game.customPenalties || [...DEFAULT_PENALTIES]);
  const [photos, setPhotos] = useState(()=>{
    const base=game.photos||[];
    const arr=Array.from({length:numHoles},(_,i)=>base[i]||[]);
    return arr;
  });
  const [currentHole, setCurrentHole] = useState(Math.min(game.currentHole||0,numHoles-1));
  const [lockedHoles, setLockedHoles] = useState((game.lockedHoles||[]).filter(h=>h<numHoles));
  const [editingHole, setEditingHole] = useState(null); // null or index
  const [view, setView] = useState("score");
  const [showHIO, setShowHIO] = useState(false);
  const [hioNames, setHioNames] = useState("");
  const [showExit, setShowExit] = useState(false);
  const [showCustomPen, setShowCustomPen] = useState(false);
  const [newPen, setNewPen] = useState({label:"",icon:"⭐",strokes:1});
  const [phase, setPhase] = useState("playing");

  const activeHole = editingHole !== null ? editingHole : currentHole;
  const hole = holes[activeHole];
  const isEditing = editingHole !== null;

  const getEffective=(pi,hi)=>{
    const sc=scores[pi][hi];
    if(sc.dnf) return holes[hi].par+2;
    if(sc.sips===null) return null;
    const pens=sc.penalties.reduce((s,p)=>s+p.strokes,0);
    const bets=sideBets.filter(b=>b.playerIdx===pi&&b.holeIdx===hi).reduce((s,b)=>s+(b.rewardNum||0),0);
    return Math.max(0,sc.sips+pens+bets);
  };
  const isHIO=(pi,hi)=>{const sc=scores[pi][hi];return!sc.dnf&&sc.sips===1&&sc.penalties.length===0;};
  const isDNF=(pi,hi)=>scores[pi][hi].dnf===true;
  const getTotal=(pi,from=0,to=holes.length)=>{let t=0;for(let i=from;i<to;i++){const e=getEffective(pi,i);if(e!==null)t+=e;}return t;};
  const getPar=(from=0,to=holes.length)=>holes.slice(from,to).filter(h=>h.par).reduce((s,h)=>s+h.par,0);

  const updateHole=(field,val)=>{
    setHoles(prev=>{const h=[...prev];h[activeHole]={...h[activeHole],[field]:val};return h;});
  };
  const addDrinkToHole=(drink)=>{
    setHoles(prev=>{
      const h=[...prev];
      if(!h[activeHole].drinks.includes(drink)) h[activeHole]={...h[activeHole],drinks:[...h[activeHole].drinks,drink]};
      return h;
    });
  };
  const updateScore=(pi,field,val)=>{
    setScores(prev=>{
      const s=prev.map(r=>r.map(c=>({...c,penalties:[...c.penalties]})));
      s[pi][activeHole]={...s[pi][activeHole],[field]:val};
      return s;
    });
  };
  const togglePenalty=(pi,pen)=>{
    setScores(prev=>{
      const s=prev.map(r=>r.map(c=>({...c,penalties:[...c.penalties]})));
      const pens=s[pi][activeHole].penalties;
      s[pi][activeHole].penalties=pens.find(p=>p.id===pen.id)?pens.filter(p=>p.id!==pen.id):[...pens,pen];
      return s;
    });
  };
  const skipPlayer=(pi)=>{
    setScores(prev=>{
      const s=prev.map(r=>r.map(c=>({...c,penalties:[...c.penalties]})));
      const cur=s[pi][activeHole];
      s[pi][activeHole]={...cur,dnf:!cur.dnf,sips:null,penalties:[]};
      return s;
    });
  };

  const allScored=()=>players.every((_,pi)=>{
    const sc=scores[pi][activeHole];
    return sc.dnf===true||(sc.sips!==null&&sc.sips>=1);
  });
  const holeReady=()=>hole.par>=1&&players.every((_,pi)=>scores[pi][activeHole].dnf===true||(scores[pi][activeHole].drink!==null&&scores[pi][activeHole].drink!==undefined))&&allScored();

  const saveRound=()=>{
    try{
      const rounds=JSON.parse(localStorage.getItem("pubgolf_rounds")||"[]");
      const ts=Date.now();
      try{
        sessionStorage.setItem(`pubgolf_photos_${ts}`,JSON.stringify(photos));
      }catch(e){}
      // Strip photo blobs from main record to stay within localStorage limits
      const holesNoPhotos=holes.map(h=>({...h}));
      rounds.push({gameName,players,holes:holesNoPhotos,scores,sideBets,date:new Date().toLocaleDateString(),numHoles,ts,hasPhotos:photos.some(h=>h.length>0)});
      localStorage.setItem("pubgolf_rounds",JSON.stringify(rounds.slice(-20)));
    }catch(e){console.warn("Save failed:",e);}
  };

  const confirmHole=()=>{
    if(isEditing){setEditingHole(null);return;}
    try{ if(navigator.vibrate) navigator.vibrate(40); }catch(e){}
    const hioP=players.filter((_,pi)=>isHIO(pi,currentHole));
    if(hioP.length>0){
      setHioNames(hioP.map(p=>p.name).join(" & "));
      setShowHIO(true);
      try{ if(navigator.vibrate) navigator.vibrate([80,40,80,40,200]); }catch(e){}
      setTimeout(()=>{setShowHIO(false);advanceHole();},3500);
    } else {
      advanceHole();
    }
  };
  const advanceHole=()=>{
    setLockedHoles(prev=>[...new Set([...prev,currentHole])]);
    if(currentHole<numHoles-1){
      setCurrentHole(currentHole+1);
      setView("score");
    } else {
      saveRound();
      setPhase("finished");
    }
  };

  const addCustomPen=()=>{
    if(!newPen.label.trim()) return;
    setCustomPenalties(prev=>[...prev,{...newPen,id:`cp_${Date.now()}`}]);
    setNewPen({label:"",icon:"⭐",strokes:1});
    setShowCustomPen(false);
  };

  const board=players.map((p,i)=>({...p,idx:i,total:getTotal(i),played:scores[i].filter(h=>h.sips!==null||h.dnf).length})).sort((a,b)=>a.total-b.total||b.played-a.played);

  if(showExit) return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:18,padding:24,maxWidth:320,width:"100%",boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}}>
        <h3 style={{color:T.text,fontFamily:"Georgia,serif",fontSize:20,margin:"0 0 8px"}}>Leave round?</h3>
        <p style={{color:T.textDim,fontFamily:"system-ui",fontSize:13,margin:"0 0 20px"}}>Hole {currentHole+1}/{numHoles} · Scores saved — continue anytime from home.</p>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <button onClick={()=>{onHome({gameName,players,holes,scores,sideBets,numHoles,currentHole,lockedHoles,customPenalties,photos});}} style={S.bigGreenBtn}>🏠 Home (save & exit)</button>
          <button onClick={()=>{onEnd();}} style={S.outlineBtn}>🔄 New Round</button>
          <button onClick={()=>setShowExit(false)} style={{...S.outlineBtn,borderColor:T.border,color:T.textMid}}>↩ Continue</button>
        </div>
      </div>
    </div>
  );

  if(phase==="finished") return (
    <FinishedScreen gameName={gameName} players={players} holes={holes} scores={scores} sideBets={sideBets} getEffective={getEffective} getTotal={getTotal} getPar={getPar} isHIO={isHIO} isDNF={isDNF} half={half} onHome={onHome} onNew={onEnd}/>
  );

  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(180deg,${T.bgInput} 0%,${T.bg} 100%)`}}>
      {showHIO&&<Fireworks onDone={()=>setShowHIO(false)}/>}
      {showHIO&&(
        <div style={{position:"fixed",inset:0,zIndex:201,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
          <div style={{background:T.bgCard,border:`3px solid ${T.amber}`,borderRadius:20,padding:"24px 36px",textAlign:"center",boxShadow:`0 0 60px ${T.amber}88`}}>
            <div style={{fontSize:32}}>🌟</div>
            <div style={{color:T.amber,fontFamily:"Georgia,serif",fontSize:26,fontWeight:900,marginTop:6}}>HOLE IN ONE!</div>
            <div style={{fontSize:15,marginTop:6,display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"}}>
              {hioNames.split(" & ").map((name,i)=>{
                const pl=players.find(p=>p.name===name);
                return <span key={i} style={{color:pl?pl.colour.hex:T.amber,fontFamily:"Georgia,serif",fontWeight:700,fontSize:16}}>{name}</span>;
              })}
            </div>
          </div>
        </div>
      )}

      {/* Top bar */}
      <div style={{background:T.bgMid,padding:"10px 12px 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontFamily:"Georgia,serif",fontWeight:700,fontSize:15,color:T.white,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{gameName}</div>
          </div>
          <button onClick={()=>setView(v=>v==="score"?"card":"score")} style={{...S.tabPill,background:view==="card"?T.amberPale:T.greenPale+"44",color:view==="card"?T.bgDark:T.greenPale}}>
            {view==="card"?"Scoring":"Scorecard"}
          </button>
          <button onClick={()=>setShowExit(true)} style={{background:"none",border:"none",color:T.greenPale,fontSize:18,cursor:"pointer",padding:"4px"}}>⌂</button>
        </div>
        {/* Hole tabs */}
        <div style={{display:"flex",gap:3,overflowX:"auto",paddingBottom:8,scrollbarWidth:"none"}}>
          {Array.from({length:numHoles},(_,i)=>{
            const locked=lockedHoles.includes(i);
            const isActive=i===activeHole;
            const isCurrent=i===currentHole;
            const future=i>currentHole&&!locked;
            return(
              <button key={i}
                onClick={()=>{
                  if(i===currentHole&&editingHole===null){return;}
                  if(locked||i<currentHole){setEditingHole(i===currentHole?null:i);}
                }}
                style={{
                  flexShrink:0,minWidth:34,height:30,borderRadius:8,
                  border:`1.5px solid ${isActive?T.amberPale:locked?T.greenPale+"66":"transparent"}`,
                  background:isActive?`linear-gradient(135deg,${T.amber},${T.brown})`
                    :locked?"rgba(140,196,132,0.25)":future?"transparent":"rgba(140,196,132,0.12)",
                  color:isActive?"#fff":locked?T.greenPale:future?T.greenPale+"33":T.greenPale,
                  fontSize:12,fontWeight:isActive?800:isCurrent?700:400,
                  cursor:future?"default":"pointer",
                  fontFamily:"system-ui",
                  boxShadow:isActive?`0 2px 8px ${T.amber}66`:"none",
                }}>
                {i+1}
              </button>
            );
          })}
        </div>
      </div>

      {/* Edit banner */}
      {isEditing&&(
        <div style={{background:T.amber,padding:"8px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontFamily:"system-ui",fontSize:13,color:T.bgDark,fontWeight:700}}>✏️ Editing Hole {activeHole+1}</span>
          <button onClick={()=>setEditingHole(null)} style={{background:T.bgDark,border:"none",borderRadius:8,padding:"4px 10px",color:T.amberPale,fontSize:12,cursor:"pointer",fontFamily:"system-ui"}}>Done Editing</button>
        </div>
      )}

      {view==="card"?(
        <div style={{padding:14,maxWidth:480,margin:"0 auto"}}>
          <Scorecard players={players} holes={holes} scores={scores} halfPoint={half} currentHole={currentHole} getEffective={getEffective} isHIO={isHIO} isDNF={isDNF}/>
        </div>
      ):(
        <div style={{padding:"12px 14px 100px",maxWidth:480,margin:"0 auto"}}>

          {/* Hole details */}
          <div style={{background:T.bgCard,border:`1.5px solid ${T.border}`,borderRadius:16,padding:"12px 14px",marginBottom:12,boxShadow:"0 2px 10px rgba(0,0,0,0.08)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
              <div style={{flex:1}}>
                <FL>Hole {activeHole+1} of {numHoles}{isEditing?" · Editing":""}</FL>
                <GInput value={hole.name} onChange={e=>updateHole("name",e.target.value)} placeholder={`e.g. The Crown`}/>
              </div>
              <div style={{minWidth:80}}>
                <FL style={{textAlign:"center"}}>Par</FL>
                <div style={{display:"flex",alignItems:"center",gap:4,justifyContent:"center"}}>
                  <button onClick={()=>updateHole("par",Math.max(1,hole.par-1))} style={S.parBtn}>−</button>
                  <div style={{fontSize:24,fontWeight:900,color:T.amber,fontFamily:"Georgia,serif",minWidth:32,textAlign:"center"}}>{hole.par}</div>
                  <button onClick={()=>updateHole("par",hole.par+1)} style={S.parBtn}>+</button>
                </div>
              </div>
            </div>
          </div>

          {/* Players */}
          {players.map((player,pi)=>(
            <div key={pi}>
              <PlayerScoreCard
                drinkValue={scores[pi][activeHole].drink||null}
                drinks={hole.drinks||DEFAULT_DRINKS}
                onSelectDrink={v=>{updateScore(pi,"drink",v);if(pi===0)updateHole("drink",v);}}
                onAddDrink={d=>addDrinkToHole(d)}
                player={player} pi={pi}
                ps={scores[pi][activeHole]}
                hole={hole}
                customPenalties={customPenalties}
                onSips={n=>updateScore(pi,"sips",n)}
                onTogglePenalty={pen=>togglePenalty(pi,pen)}
                onOpenCustomPen={()=>setShowCustomPen(true)}
                onSkip={()=>skipPlayer(pi)}
              />
            </div>
          ))}

          {/* Photos */}
          <PhotoSection photos={photos[activeHole]} onAdd={p=>setPhotos(prev=>{const n=prev.map(h=>[...h]);n[activeHole]=[...n[activeHole],p];return n;})}/>

          {/* Side bets */}
          <SideBetsSection players={players} holeIdx={activeHole} sideBets={sideBets} onAdd={b=>setSideBets(prev=>[...prev,{...b,globalIdx:Date.now()+Math.random()}])} onRemove={idx=>setSideBets(prev=>prev.filter(b=>b.globalIdx!==idx))}/>

          {/* Next/Confirm */}
          <button onClick={confirmHole} disabled={!holeReady()} style={{...S.bigGreenBtn,marginTop:12,opacity:holeReady()?1:0.45,background:holeReady()?`linear-gradient(135deg,${T.green},${T.greenDark})`:T.greenLight}}>
            {isEditing?"✓ Save Changes":currentHole<numHoles-1?`Next: Hole ${currentHole+2} →`:"🏆 Finish Round"}
          </button>
          {!holeReady()&&(
            <div style={{textAlign:"center",fontSize:12,color:T.textDim,fontFamily:"system-ui",marginTop:6}}>
              {(()=>{const missing=players.filter((_,pi)=>!scores[pi][activeHole].dnf&&!scores[pi][activeHole].drink).map(p=>p.name);return missing.length>0?`🍺 ${missing.join(", ")} need${missing.length===1?"s":""} a drink · `:"";})()}{!allScored()?"All players need a score ≥ 1 or DNF":""}
            </div>
          )}
          {/* Back button small top-left style */}
          {(currentHole>0||isEditing)&&(
            <button onClick={()=>{if(isEditing){setEditingHole(null);}else{setCurrentHole(currentHole-1);}}} style={{...S.smallBackBtn,marginTop:8}}>
              ← {isEditing?`Back to Hole ${currentHole+1}`:`Back to Hole ${currentHole}`}
            </button>
          )}

          {/* Mini leaderboard */}
          <div style={{marginTop:14,background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
            <div style={{padding:"8px 14px",borderBottom:`1px solid ${T.border}`,fontSize:10,color:T.amber,letterSpacing:3,fontFamily:"system-ui",textTransform:"uppercase",fontWeight:700,background:`linear-gradient(135deg,${T.bgDark},${T.bgMid})`}}>Leaderboard</div>
            {board.map((p,rank)=>{
              const rel=getPar(0,p.played)>0?p.total-getPar(0,p.played):null;
              return(
                <div key={p.idx} style={{display:"flex",alignItems:"center",padding:"8px 12px",borderBottom:rank<board.length-1?`1px solid ${T.border}`:"none"}}>
                  <span style={{fontSize:12,color:T.textLight,width:18,fontFamily:"system-ui"}}>{rank+1}</span>
                  <div style={{width:8,height:8,borderRadius:"50%",background:p.colour.hex,marginRight:8,flexShrink:0}}/>
                  <span style={{flex:1,fontSize:14,color:p.colour.hex,fontFamily:"Georgia,serif",fontWeight:700}}>{p.name}</span>
                  <div style={{display:"flex",alignItems:"baseline",gap:4,marginRight:10}}>
                    <span style={{fontSize:14,fontWeight:700,color:p.colour.hex,fontFamily:"Georgia,serif"}}>{p.total}</span>
                    {p.played>0&&getPar(0,p.played)>0&&<span style={{fontSize:11,color:T.textDim,fontFamily:"system-ui"}}>({getPar(0,p.played)})</span>}
                  </div>
                  <span style={{fontSize:13,fontWeight:700,fontFamily:"Georgia,serif",color:p.colour.hex,minWidth:28,textAlign:"right"}}>{p.played===0?"—":rel===null?"—":rel===0?"E":rel>0?`+${rel}`:`${rel}`}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Custom penalty modal */}
      {showCustomPen&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:18,padding:22,maxWidth:320,width:"100%"}}>
            <h3 style={{color:T.text,fontFamily:"Georgia,serif",margin:"0 0 14px"}}>Add Custom Penalty</h3>
            <GInput value={newPen.label} onChange={e=>setNewPen(p=>({...p,label:e.target.value}))} placeholder="Penalty name..." style={{marginBottom:10}}/>
            <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}>
              <GInput value={newPen.icon} onChange={e=>setNewPen(p=>({...p,icon:e.target.value}))} style={{width:56,textAlign:"center"}}/>
              <button onClick={()=>setNewPen(p=>({...p,strokes:Math.max(1,p.strokes-1)}))} style={S.parBtn}>−</button>
              <span style={{color:T.amber,fontFamily:"Georgia,serif",fontSize:18,fontWeight:700,minWidth:28,textAlign:"center"}}>{newPen.strokes}</span>
              <button onClick={()=>setNewPen(p=>({...p,strokes:p.strokes+1}))} style={S.parBtn}>+</button>
              <span style={{color:T.textMid,fontFamily:"system-ui",fontSize:13}}>strokes</span>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowCustomPen(false)} style={{...S.outlineBtn,flex:1,fontSize:14,padding:"10px"}}>Cancel</button>
              <button onClick={addCustomPen} style={{...S.bigGreenBtn,flex:1,fontSize:14,padding:"10px"}}>Add</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Finished ─────────────────────────────────────────────────────────────────
function FinishedScreen({ gameName, players, holes, scores, sideBets, getEffective, getTotal, getPar, isHIO, isDNF, half, onHome, onNew }) {
  const sorted=players.map((p,i)=>{
    const dnfCount=scores[i].filter(h=>h.dnf===true).length;
    const dnfPenalty=dnfCount*2;
    const rawTotal=getTotal(i);
    const adjustedTotal=rawTotal+dnfPenalty;
    const par=getPar();
    const rel=par>0?adjustedTotal-par:null;
    return {...p,total:rawTotal,adjustedTotal,dnfCount,dnfPenalty,rel};
  }).sort((a,b)=>a.adjustedTotal-b.adjustedTotal);
  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(180deg,${T.bgInput} 0%,${T.bg} 100%)`}}>
      <div style={{background:`linear-gradient(160deg,${T.bgDark},${T.bgMid})`,padding:"24px 16px 20px",textAlign:"center"}}>
        <div style={{fontSize:48}}>🏆</div>
        <h1 style={{margin:"6px 0 0",fontFamily:"Georgia,serif",fontSize:26,color:T.amberPale,letterSpacing:3}}>ROUND OVER</h1>
        <p style={{margin:"4px 0 0",color:T.greenPale,fontFamily:"system-ui",fontSize:13}}>{gameName} · Saved ✓</p>
      </div>
      <div style={{padding:"16px 14px 80px",maxWidth:480,margin:"0 auto"}}>
        {sorted.map((p,rank)=>(
          <div key={rank} style={{background:rank===0?"#fffbe8":T.bgCard,border:`2px solid ${rank===0?T.amber:p.colour.hex+"44"}`,borderRadius:14,padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:12,boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
            <div style={{fontSize:26}}>{["🥇","🥈","🥉"][rank]||`#${rank+1}`}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:17,color:p.colour.hex,fontFamily:"Georgia,serif"}}>{p.name}</div>
              <div style={{fontSize:12,color:T.textDim,fontFamily:"system-ui",marginTop:2}}>
                {p.total} sips{getPar()>0?` (${getPar()})`:""}</div>
            </div>
            <div style={{textAlign:"right"}}>
              {p.rel!==null&&<div style={{fontSize:20,fontWeight:700,fontFamily:"Georgia,serif",color:p.colour.hex}}>{p.rel<0?p.rel:p.rel===0?"E":`+${p.rel}`}</div>}
              <div style={{fontSize:10,color:T.textDim,fontFamily:"system-ui"}}>{p.rel===null?"—":p.rel===0?"even":p.rel>0?"over par":"under par"}</div>
              {p.dnfCount>0&&<div style={{fontSize:11,color:T.red,fontFamily:"system-ui",marginTop:2}}>{p.dnfCount}×DNF (+{p.dnfPenalty})</div>}
            </div>
          </div>
        ))}
        <div style={{marginTop:18}}>
          <Scorecard players={players} holes={holes} scores={scores} halfPoint={half} currentHole={-1} getEffective={getEffective} isHIO={isHIO} isDNF={isDNF}/>
        </div>
        <div style={{display:"flex",gap:10,marginTop:18}}>
          <button onClick={()=>onHome(null)} style={{...S.outlineBtn,flex:1}}>🏠 Home</button>
          <button onClick={onNew} style={{...S.bigGreenBtn,flex:1,padding:"13px"}}>🔄 New Round</button>
        </div>
      </div>
    </div>
  );
}

// ─── Past Round ───────────────────────────────────────────────────────────────
function PastRoundScreen({ round, onBack }) {
  const getEffective=(pi,hi)=>{const sc=round.scores[pi][hi];if(sc.dnf)return round.holes[hi].par+2;if(sc.sips===null)return null;return Math.max(0,sc.sips+sc.penalties.reduce((s,p)=>s+p.strokes,0));};
  const isHIO=(pi,hi)=>{const sc=round.scores[pi][hi];return!sc.dnf&&sc.sips===1&&sc.penalties.length===0;};
  const isDNF=(pi,hi)=>round.scores[pi][hi].dnf===true;
  const getTotal=(pi,from=0,to=round.holes.length)=>{let t=0;for(let i=from;i<to;i++){const e=getEffective(pi,i);if(e!==null)t+=e;}return t;};
  const getPar=(from=0,to=round.holes.length)=>round.holes.slice(from,to).filter(h=>h.par).reduce((s,h)=>s+h.par,0);
  const half=Math.ceil(round.holes.length/2);
  const sorted=round.players.map((p,i)=>({...p,total:getTotal(i),rel:getPar()>0?getTotal(i)-getPar():null})).sort((a,b)=>a.total-b.total);
  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(180deg,${T.bgInput} 0%,${T.bg} 100%)`}}>
      <div style={{background:T.bgMid,padding:"14px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={onBack} style={S.backBtn}>‹</button>
          <div>
            <h2 style={{margin:0,fontFamily:"Georgia,serif",color:T.white,fontSize:19}}>{round.gameName}</h2>
            <div style={{fontSize:12,color:T.greenPale,fontFamily:"system-ui"}}>{round.date}</div>
          </div>
        </div>
      </div>
      <div style={{padding:"14px 14px 60px",maxWidth:480,margin:"0 auto"}}>
        {sorted.map((p,rank)=>(
          <div key={rank} style={{background:rank===0?"#fffbe8":T.bgCard,border:`2px solid ${rank===0?T.amber:p.colour.hex+"44"}`,borderRadius:12,padding:"10px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontSize:22}}>{["🥇","🥈","🥉"][rank]||`${rank+1}.`}</div>
            <div style={{flex:1}}>
              <div style={{color:p.colour.hex,fontFamily:"Georgia,serif",fontWeight:700}}>{p.name}</div>
              <div style={{color:T.textDim,fontSize:12,fontFamily:"system-ui"}}>
                {p.total}{getPar()>0?` (${getPar()})`:""} sips</div>
            </div>
            {p.rel!==null&&<div style={{color:p.colour.hex,fontWeight:700,fontFamily:"Georgia,serif",fontSize:16}}>{p.rel<0?p.rel:p.rel===0?"E":`+${p.rel}`}</div>}
          </div>
        ))}
        <div style={{marginTop:14}}>
          <Scorecard players={round.players} holes={round.holes} scores={round.scores} halfPoint={half} currentHole={-1} getEffective={getEffective} isHIO={isHIO} isDNF={isDNF}/>
        </div>
      </div>
    </div>
  );
}

// ─── Shared UI ────────────────────────────────────────────────────────────────
function GCard({ children, style }) {
  return <div style={{background:T.bgCard,border:`1.5px solid ${T.border}`,borderRadius:18,padding:"14px",marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.07)",...style}}>{children}</div>;
}
function FL({ children, style }) {
  return <div style={{fontSize:11,color:T.textMid,letterSpacing:1.2,textTransform:"uppercase",fontFamily:"system-ui",marginBottom:7,fontWeight:600,...style}}>{children}</div>;
}
function GInput({ style, ...props }) {
  return <input {...props} style={{...S.gi,...style}}/>;
}
function SecDiv({ label }) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,marginTop:4}}>
      <div style={{flex:1,height:1,background:T.border}}/>
      <span style={{fontSize:11,color:T.textDim,letterSpacing:2,textTransform:"uppercase",fontFamily:"system-ui"}}>{label}</span>
      <div style={{flex:1,height:1,background:T.border}}/>
    </div>
  );
}
function BotNav({ onBack, onNext, nextLabel, disabled, green }) {
  return (
    <div style={{display:"flex",gap:10,marginTop:10,alignItems:"center"}}>
      {onBack&&<button onClick={onBack} style={{...S.smallBackBtn,flex:0}}>‹ Back</button>}
      <button onClick={onNext} disabled={disabled} style={{...S.bigGreenBtn,flex:1,opacity:disabled?0.4:1}}>{nextLabel}</button>
    </div>
  );
}

// ─── Styles ───────────────────────────────────────────────────────────────────
const S = {
  bigGreenBtn:{width:"100%",padding:"15px",borderRadius:30,border:"none",background:`linear-gradient(160deg,${T.green} 0%,${T.greenDark} 100%)`,color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"system-ui",boxShadow:`0 6px 20px ${T.green}55`,letterSpacing:0.8,transition:"all 0.2s"},
  outlineBtn:{width:"100%",padding:"13px",borderRadius:30,border:`2px solid ${T.green}`,background:"rgba(58,125,50,0.06)",color:T.green,fontSize:15,fontWeight:600,cursor:"pointer",fontFamily:"system-ui",transition:"all 0.2s"},
  gi:{width:"100%",padding:"11px 16px",borderRadius:20,border:`1.5px solid ${T.border}`,background:T.bgInput,color:T.text,fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"system-ui",transition:"border-color 0.2s",boxShadow:"inset 0 1px 3px rgba(0,0,0,0.05)"},
  chip:{padding:"8px 16px",borderRadius:20,border:`1.5px solid ${T.border}`,background:"transparent",color:T.textMid,cursor:"pointer",fontSize:14,fontFamily:"system-ui"},
  chipActive:{background:T.greenLight,borderColor:T.green,color:T.greenDark},

  th:{padding:"5px 6px",fontSize:10,fontWeight:700,letterSpacing:1,textAlign:"center",fontFamily:"system-ui",textTransform:"uppercase"},
  td:{padding:"5px 5px",textAlign:"center",fontSize:12,color:"#333"},
};

const T_extra = { creamMid:"#d4c9a8" };
const creamMid = "#d4c9a8";

// ─── App Root ─────────────────────────────────────────────────────────────────
export default function App() {
  const [screen,setScreen]=useState("home");
  const [game,setGame]=useState(null);
  const [teeAnim,setTeeAnim]=useState(false);
  const [pastRound,setPastRound]=useState(null);
  const [savedGame,setSavedGame]=useState(null);

  const startGame=(gameData)=>{setGame(gameData);setTeeAnim(true);};

  if(teeAnim) return <TeeOffAnimation onDone={()=>{setTeeAnim(false);setScreen("game");}}/>;
  if(screen==="past"&&pastRound) return <PastRoundScreen round={pastRound} onBack={()=>setScreen("home")}/>;
  if(screen==="game"&&game) return <GameScreen
    game={game}
    onEnd={()=>{setGame(null);setSavedGame(null);setScreen("setup");}}
    onHome={(snapshot)=>{setSavedGame(snapshot||null);setGame(null);setScreen("home");}}/>;
  if(screen==="setup") return <SetupScreen onStart={startGame} onBack={()=>setScreen("home")}/>;
  return <HomeScreen
    onNewGame={()=>{setSavedGame(null);setScreen("setup");}}
    onLoadRound={r=>{setPastRound(r);setScreen("past");}}
    onContinueRound={()=>{if(savedGame){setGame(savedGame);setTeeAnim(true);}}}
    savedGame={savedGame}
  />;
}

const _r=ReactDOM.createRoot(document.getElementById('root'));
_r.render(React.createElement(App));
requestAnimationFrame(function(){requestAnimationFrame(hs);});
</script>
